<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mawaqit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  width: 100%;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0d0d0d;
  transition: background 2s ease, color 2s ease;
  font-family: 'Cormorant', Georgia, serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  color: #fff;
}

.wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: 0 40px;
  text-align: center;
}

.prayer {
  font-size: clamp(72px, 20vw, 120px);
  font-weight: 300;
  letter-spacing: -0.03em;
  line-height: 0.88;
  color: inherit;
  transition: color 2s ease;
  will-change: opacity, transform;
}

.prayer.leaving {
  animation: leave 0.5s cubic-bezier(0.4, 0, 1, 1) forwards;
}

.prayer.entering {
  animation: enter 0.7s cubic-bezier(0, 0, 0.2, 1) forwards;
}

@keyframes leave {
  0%   { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-12px); }
}

@keyframes enter {
  0%   { opacity: 0; transform: translateY(14px); }
  100% { opacity: 1; transform: translateY(0); }
}

.countdown {
  font-family: 'Cormorant', serif;
  font-size: clamp(32px, 9vw, 52px);
  font-weight: 300;
  font-style: italic;
  letter-spacing: -0.01em;
  font-variant-numeric: tabular-nums;
  color: inherit;
  opacity: 0.42;
  margin-top: 14px;
  transition: color 2s ease, font-size 0.6s cubic-bezier(0.16,1,0.3,1), opacity 0.6s ease;
  will-change: opacity, font-size;
}

/* last 60s: full screen takeover */
body.final .wrap {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0;
}

body.final #pname {
  animation: fadeout-name 0.6s cubic-bezier(0.4,0,1,1) forwards;
  pointer-events: none;
  height: 0;
  overflow: hidden;
}

body.final .countdown {
  font-size: clamp(120px, 38vw, 260px);
  font-weight: 300;
  font-style: normal;
  opacity: 1;
  margin-top: 0;
  letter-spacing: -0.05em;
  line-height: 0.85;
  text-align: center;
}
</style>
</head>
<body>

<div class="wrap">
  <div style="display:none">
    <button id="autoBtn" style="padding:4px 8px">Auto location</button>
    <input id="latInput" type="number" step="0.0001" placeholder="Latitude" style="width:110px;padding:4px 6px">
    <input id="lngInput" type="number" step="0.0001" placeholder="Longitude" style="width:110px;padding:4px 6px">
    <button id="manualBtn" style="padding:4px 8px">Set manual</button>
    <select id="methodSelect" style="padding:4px 6px">
      <option value="3">Muslim World League</option>
      <option value="2">ISNA</option>
      <option value="5">Egyptian</option>
      <option value="4">Umm Al-Qura</option>
      <option value="1">Karachi</option>
      <option value="7">Tehran</option>
      <option value="0">Jafari</option>
    </select>
    <span id="syncStatus" style="font-size:11px;opacity:.6;white-space:nowrap"></span>
  </div>
  <div class="prayer" id="pname"></div>
  <div class="countdown" id="cd"></div>
</div>

<script>
'use strict';

const D = Math.PI / 180;

function jd(d) {
  const Y = d.getFullYear(), M = d.getMonth() + 1, DD = d.getDate();
  const A = Math.floor(Y / 100), B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (Y + 4716)) + Math.floor(30.6001 * (M + 1)) + DD + B - 1524.5;
}

function sun(j) {
  const n = j - 2451545;
  const L = (280.46 + 0.9856474 * n) % 360;
  const g = (357.528 + 0.9856003 * n) * D;
  const e2 = (L + 1.915 * Math.sin(g) + 0.02 * Math.sin(2 * g)) * D;
  const ep = (23.439 - 0.0000004 * n) * D;
  return {
    dec: Math.asin(Math.sin(ep) * Math.sin(e2)) / D,
    eqt: L - Math.atan2(Math.cos(ep) * Math.sin(e2), Math.cos(e2)) / D
  };
}

function ha(lat, dec, alt) {
  return Math.acos(Math.max(-1, Math.min(1,
    (Math.sin(alt * D) - Math.sin(lat * D) * Math.sin(dec * D)) /
    (Math.cos(lat * D) * Math.cos(dec * D))
  ))) / D;
}

function toMins(frac) {
  let f = ((frac % 24) + 24) % 24;
  const h = Math.floor(f), mn = Math.round((f - h) * 60);
  return mn === 60 ? (h + 1) * 60 : h * 60 + mn;
}

function getPrayers(lat, lng) {
  const j = jd(new Date());
  const { dec, eqt } = sun(j);
  const noon = 12 - eqt / 15 - lng / 15 + (new Date().getTimezoneOffset() / -60);
  return [
    { n: 'Fajr',    t: toMins(noon - ha(lat, dec, -18) / 15) },
    { n: 'Dhuhr',   t: toMins(noon + 0.033) },
    { n: 'Asr',     t: toMins(noon + Math.acos(1 / (2 + Math.tan(Math.abs(lat - dec) * D))) / D / 15) },
    { n: 'Maghrib', t: toMins(noon + ha(lat, dec, -0.833) / 15) },
    { n: 'Isha',    t: toMins(noon + ha(lat, dec, -17) / 15) }
  ];
}

/* ── state — default Srinagar, J&K, India ── */
let lat = 34.0837, lng = 74.7973;
let prayers = getPrayers(lat, lng);
let currentPrayer = null;
let prayerDateKey = new Date().toDateString();
let calcMethod = 3; // Muslim World League default

/* ── sync status ── */
function setSyncStatus(source) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  if (source === 'synced') {
    el.innerHTML = '<span style="color:#4caf50">&#9679;</span> Synced';
  } else if (source === 'cached') {
    el.innerHTML = '<span style="color:#ff9800">&#9679;</span> Cached';
  } else {
    el.innerHTML = '<span style="color:#9e9e9e">&#9679;</span> Local (fixed angles)';
  }
}

/* ── Aladhan API fetch ── */
async function fetchApiPrayerTimes(lat, lng, method) {
  try {
    const ts = Math.floor(Date.now() / 1000);
    const url = 'https://api.aladhan.com/v1/timings/' + ts + '?latitude=' + lat + '&longitude=' + lng + '&method=' + method;
    const resp = await fetch(url, { signal: AbortSignal.timeout(8000) });
    if (!resp.ok) return null;
    const data = await resp.json();
    const timings = data.data.timings;
    const names = ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
    const result = [];
    for (let i = 0; i < names.length; i++) {
      const raw = timings[names[i]];
      if (!raw) return null;
      const parts = raw.split(':');
      const mins = parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
      result.push({ n: names[i], t: mins });
    }
    return result;
  } catch (e) {
    return null;
  }
}

/* ── localStorage caching ── */
function getCachedTimes() {
  try {
    const raw = localStorage.getItem('mwq_api_times');
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) {
    return null;
  }
}

function setCachedTimes(times) {
  const now = new Date();
  const dateStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
  const entry = {
    date: dateStr,
    lat: lat,
    lng: lng,
    method: calcMethod,
    times: times,
    fetchedAt: now.toISOString()
  };
  localStorage.setItem('mwq_api_times', JSON.stringify(entry));
}

function isCacheValid(cache) {
  if (!cache) return false;
  const now = new Date();
  const todayStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
  if (cache.date !== todayStr) return false;
  if (Math.abs(cache.lat - lat) > 0.01) return false;
  if (Math.abs(cache.lng - lng) > 0.01) return false;
  if (cache.method !== calcMethod) return false;
  return true;
}

/* ── sync orchestration ── */
async function syncPrayerTimes() {
  // Try cache first for immediate display
  const cache = getCachedTimes();
  if (isCacheValid(cache)) {
    prayers = cache.times;
    setSyncStatus('cached');
  }

  // If online, try API
  if (navigator.onLine) {
    const apiTimes = await fetchApiPrayerTimes(lat, lng, calcMethod);
    if (apiTimes) {
      prayers = apiTimes;
      setCachedTimes(apiTimes);
      setSyncStatus('synced');
      render();
      return;
    }
  }

  // If we already applied cache above, we are done
  if (isCacheValid(cache)) {
    render();
    return;
  }

  // Fallback to local calculation
  prayers = getPrayers(lat, lng);
  setSyncStatus('local');
  render();
}

/* ── connectivity events ── */
window.addEventListener('online', function() {
  syncPrayerTimes();
});

window.addEventListener('offline', function() {
  const cache = getCachedTimes();
  if (isCacheValid(cache)) {
    setSyncStatus('cached');
  } else {
    setSyncStatus('local');
  }
});

function setLocation(newLat, newLng, persist = true) {
  if (!Number.isFinite(newLat) || !Number.isFinite(newLng)) return;
  lat = newLat;
  lng = newLng;
  prayers = getPrayers(lat, lng);
  prayerDateKey = new Date().toDateString();
  if (persist) localStorage.setItem('mwq_location', JSON.stringify({ lat, lng }));
  document.getElementById('latInput').value = lat.toFixed(4);
  document.getElementById('lngInput').value = lng.toFixed(4);
  render();
  syncPrayerTimes();
}

function useAutoLocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    (pos) => setLocation(pos.coords.latitude, pos.coords.longitude),
    () => {}
  );
}

/* ── sky palettes ── */
const SKY = {
  Fajr:    { bg: '#0e1a2b', fg: '#c8d8f0' }, // deep navy, pre-dawn blue
  Dhuhr:   { bg: '#e8e0d0', fg: '#1a1410' }, // bleached stone, harsh noon
  Asr:     { bg: '#c97a2a', fg: '#fdf0e0' }, // amber, Dal Lake gold
  Maghrib: { bg: '#7a2a1a', fg: '#fde8d8' }, // terracotta, Kashmir dusk
  Isha:    { bg: '#0a0a10', fg: '#d0cce8' }, // near-black, cool night
};

function applySky(prayerName) {
  const s = SKY[prayerName] || SKY.Isha;
  document.body.style.background = s.bg;
  document.body.style.color = s.fg;
}

/* ── transition ── */
function transitionName(newName) {
  const el = document.getElementById('pname');
  if (el.textContent === newName) return;

  el.classList.add('leaving');
  setTimeout(() => {
    el.textContent = newName;
    el.classList.remove('leaving');
    el.classList.add('entering');
    setTimeout(() => el.classList.remove('entering'), 700);
  }, 500); // exactly half of 1.2s — out then in
}

/* ── human language ── */
function humanCountdown(totalSec) {
  if (totalSec <= 60) {
    // last 60s: just the number, massive
    return { number: String(Math.max(0, totalSec)), unit: 'seconds', final: true };
  }
  const dm = Math.ceil(totalSec / 60);
  if (dm < 60) {
    return { number: String(dm), unit: dm === 1 ? 'minute' : 'minutes', final: false };
  }
  const dh = Math.floor(totalSec / 3600);
  const rm = Math.round((totalSec % 3600) / 60);
  if (rm === 0) return { number: String(dh), unit: dh === 1 ? 'hour' : 'hours', final: false };
  return { number: `${dh}h ${rm}m`, unit: '', final: false };
}

/* ── render ── */
function render() {
  const now = new Date();
  if (now.toDateString() !== prayerDateKey) {
    prayerDateKey = now.toDateString();
    syncPrayerTimes();
  }
  const nm = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;

  const nxt = prayers.find(p => (p.t % 1440) > nm) || prayers[0];

  let diff = (nxt.t % 1440) - nm;
  if (diff < 0) diff += 1440;

  const totalSec = Math.round(diff * 60);
  const { number, unit, final } = humanCountdown(totalSec);

  // Prayer name — animated transition + sky color
  if (nxt.n !== currentPrayer) {
    transitionName(nxt.n);
    applySky(nxt.n);
    currentPrayer = nxt.n;
  }

  // Final 60s takeover
  if (final) {
    document.body.classList.add('final');
    document.getElementById('cd').innerHTML =
      `<span style="display:block;line-height:0.85">${number}</span>` +
      `<span style="display:block;font-size:0.28em;opacity:0.5;letter-spacing:0.06em;text-transform:uppercase;margin-top:0.2em">${unit}</span>`;
  } else {
    document.body.classList.remove('final');
    document.getElementById('cd').textContent = unit ? `${number} ${unit}` : number;
  }
}

// Boot instantly — no flash of empty
document.getElementById('pname').textContent = '';
document.getElementById('cd').textContent = '';
render();
// Apply initial sky without waiting for prayer change detection
applySky((prayers.find(p => (p.t % 1440) > (new Date().getHours()*60+new Date().getMinutes())) || prayers[0]).n);

document.getElementById('manualBtn').addEventListener('click', () => {
  const la = parseFloat(document.getElementById('latInput').value);
  const ln = parseFloat(document.getElementById('lngInput').value);
  setLocation(la, ln);
});

document.getElementById('autoBtn').addEventListener('click', useAutoLocation);

// Load saved method
const savedMethod = localStorage.getItem('mwq_method');
if (savedMethod !== null) {
  calcMethod = parseInt(savedMethod, 10);
  document.getElementById('methodSelect').value = String(calcMethod);
}

// Method dropdown change
document.getElementById('methodSelect').addEventListener('change', function() {
  calcMethod = parseInt(this.value, 10);
  localStorage.setItem('mwq_method', String(calcMethod));
  syncPrayerTimes();
});

const saved = localStorage.getItem('mwq_location');
if (saved) {
  try {
    const p = JSON.parse(saved);
    setLocation(Number(p.lat), Number(p.lng), false);
  } catch (_) {}
} else {
  setLocation(lat, lng, false);
}

setInterval(render, 1000);

</script>
</body>
</html>
